{% extends "base.html" %}

{% block title %}Рецензия на {{ book.title }}{% endblock %}

{% block content %}
<h2>Написать рецензию на «{{ book.title }}»</h2>
<form method="post">
    <div class="mb-3">
        <label class="form-label">Оценка *</label>
        <select name="rating" class="form-select" required>
            <option value="5" selected>Отлично</option>
            <option value="4">Хорошо</option>
            <option value="3">Удовлетворительно</option>
            <option value="2">Неудовлетворительно</option>
            <option value="1">Плохо</option>
            <option value="0">Ужасно</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Текст рецензии *</label>
        <textarea name="text" id="review-editor" class="form-control" rows="6"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Отправить</button>
    <a href="{{ url_for('main.book_view', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}

{% block scripts %}
<script>
    const easyMDE = new EasyMDE({ element: document.getElementById('review-editor') });

    document.querySelector('form').addEventListener('submit', function () {
        easyMDE.codemirror.save();
    });
</script>
{% endblock %}
