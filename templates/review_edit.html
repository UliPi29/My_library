{% extends "base.html" %}

{% block title %}Редактирование рецензии{% endblock %}

{% block content %}
<h2>Редактирование рецензии на «{{ review.book.title }}»</h2>
<form method="post">
    <div class="mb-3">
        <label class="form-label">Оценка *</label>
        <select name="rating" class="form-select" required>
            <option value="5" {% if review.rating == 5 %}selected{% endif %}>Отлично</option>
            <option value="4" {% if review.rating == 4 %}selected{% endif %}>Хорошо</option>
            <option value="3" {% if review.rating == 3 %}selected{% endif %}>Удовлетворительно</option>
            <option value="2" {% if review.rating == 2 %}selected{% endif %}>Неудовлетворительно</option>
            <option value="1" {% if review.rating == 1 %}selected{% endif %}>Плохо</option>
            <option value="0" {% if review.rating == 0 %}selected{% endif %}>Ужасно</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Текст рецензии *</label>
        <textarea name="text" id="review-editor" class="form-control" rows="6">{{ review.text }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('main.book_view', book_id=review.book_id) }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}

{% block scripts %}
<script>
    const easyMDE = new EasyMDE({ element: document.getElementById('review-editor') });
</script>
{% endblock %}
